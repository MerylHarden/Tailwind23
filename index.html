<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dribbble Tailwind Mockup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-slate-900">

  <div class="max-w-6xl mx-auto px-6 py-4">

    <
    <header class="flex items-center justify-between border-b border-slate-200 pb-4 mb-5">

  
      <div class="flex items-center gap-3">
        <img 
          src="avatar.jpg" 
          alt="Profile avatar" 
          class="w-12 h-12 rounded-full object-cover"
        >

        <div class="flex items-center gap-2 text-sm">
          <strong class="font-bold">ALEX BENDER for FANCY</strong>
          <span class="text-green-600">Available for work</span>
          <a href="#" class="text-slate-500 hover:text-slate-900">Follow</a>
        </div>
      </div>

      
      <div class="flex items-center gap-3">
        <button class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-xl">
          ♡
        </button>

        <button class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-lg">
          ⌑
        </button>

        <button class="bg-slate-950 text-white px-6 py-3 rounded-full text-sm font-bold">
          Get in touch
        </button>
      </div>

    </header>

  
    <main class="flex justify-center">
      <img 
        src="ai-page.jpg" 
        alt="AI landing page design" 
        class="w-full max-w-5xl rounded-lg object-cover"
      >
    </main>

  </div>

</body>
</html>
